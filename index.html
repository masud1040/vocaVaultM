
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguistAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans Bengali', 'Hind Siliguri', 'sans-serif'],
            },
            animation: {
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+Bengali:wght@300;400;700;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <style>
      :root {
        --grid-line: rgba(79, 70, 229, 0.05);
      }
      .dark {
        --grid-line: rgba(79, 70, 229, 0.12);
      }

      body { 
        font-family: 'Inter', 'Noto Sans Bengali', 'Hind Siliguri', sans-serif; 
        transition: background-color 0.3s ease;
        overflow-x: hidden;
        width: 100vw;
        /* Prevent text selection across the whole site */
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      /* Allow input fields to still be selectable for usability */
      input, textarea {
        user-select: text !important;
        -webkit-user-select: text !important;
      }

      .font-bangla { font-family: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif; }
      
      /* The Technical Grid Pattern */
      .bg-technical-grid {
        background-image: 
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        background-position: center center;
      }
      
      /* Smooth Scroll & Transitions */
      * { scroll-behavior: smooth; }
      
      #root {
        position: relative;
        width: 100%;
        overflow-x: hidden;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { 
        background: #4f46e5; 
        border-radius: 10px; 
      }
      
      .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }
      
      /* Glassmorphism utility */
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.2",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "jspdf": "https://esm.sh/jspdf@^4.1.0",
    "html-to-image": "https://esm.sh/html-to-image@^1.11.11"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-[#050810] dark:text-slate-100 bg-technical-grid bg-fixed">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
